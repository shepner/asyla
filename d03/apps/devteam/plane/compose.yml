# Plane Community Edition on d03 — project management for devteam
# Based on official Plane v1.2.2 docker-compose.yml
# Data under /mnt/docker/Devteam/Plane
# Access via internal-proxy (plane.asyla.org). No ports published (proxy via Caddy).
# Run with: ~/scripts/d03/apps/devteam/plane/plane.sh up

x-db-env: &db-env
  PGHOST: ${PGHOST:-plane-db}
  PGDATABASE: ${PGDATABASE:-plane}
  POSTGRES_USER: ${POSTGRES_USER:-plane}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-plane}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  PGDATA: ${PGDATA:-/var/lib/postgresql/data}

x-redis-env: &redis-env
  REDIS_HOST: ${REDIS_HOST:-plane-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_URL: ${REDIS_URL:-redis://plane-redis:6379/}

x-minio-env: &minio-env
  MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
  MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}

x-aws-s3-env: &aws-s3-env
  AWS_REGION: ${AWS_REGION:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://plane-minio:9000}
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}

x-proxy-env: &proxy-env
  APP_DOMAIN: ${APP_DOMAIN:-plane.asyla.org}
  FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
  CERT_EMAIL: ${CERT_EMAIL:-}
  CERT_ACME_CA: ${CERT_ACME_CA:-}
  CERT_ACME_DNS: ${CERT_ACME_DNS:-}
  LISTEN_HTTP_PORT: 80
  LISTEN_HTTPS_PORT: 443
  BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
  SITE_ADDRESS: ${SITE_ADDRESS:-:80}

x-mq-env: &mq-env
  RABBITMQ_HOST: ${RABBITMQ_HOST:-plane-mq}
  RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-plane}
  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
  RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-plane}
  RABBITMQ_VHOST: ${RABBITMQ_VHOST:-plane}

x-live-env: &live-env
  API_BASE_URL: ${API_BASE_URL:-http://api:8000}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}

x-app-env: &app-env
  WEB_URL: ${WEB_URL:-https://plane.asyla.org}
  DEBUG: ${DEBUG:-0}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://plane.asyla.org}
  GUNICORN_WORKERS: 1
  USE_MINIO: ${USE_MINIO:-1}
  DATABASE_URL: postgresql://${POSTGRES_USER:-plane}:${POSTGRES_PASSWORD}@plane-db/${PGDATABASE:-plane}
  SECRET_KEY: ${SECRET_KEY}
  AMQP_URL: amqp://${RABBITMQ_USER:-plane}:${RABBITMQ_PASSWORD}@plane-mq:5672/${RABBITMQ_VHOST:-plane}
  API_KEY_RATE_LIMIT: ${API_KEY_RATE_LIMIT:-60/minute}
  MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-0}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}

networks:
  plane_net:
    name: plane_net
    driver: bridge

services:
  web:
    image: artifacts.plane.so/makeplane/plane-frontend:${APP_RELEASE:-v1.2.2}
    container_name: plane-web
    restart: unless-stopped
    depends_on:
      - api
      - worker
    networks:
      - plane_net

  space:
    image: artifacts.plane.so/makeplane/plane-space:${APP_RELEASE:-v1.2.2}
    container_name: plane-space
    restart: unless-stopped
    depends_on:
      - api
      - worker
      - web
    networks:
      - plane_net

  admin:
    image: artifacts.plane.so/makeplane/plane-admin:${APP_RELEASE:-v1.2.2}
    container_name: plane-admin
    restart: unless-stopped
    depends_on:
      - api
      - web
    networks:
      - plane_net

  live:
    image: artifacts.plane.so/makeplane/plane-live:${APP_RELEASE:-v1.2.2}
    container_name: plane-live
    restart: unless-stopped
    environment:
      <<: [*live-env, *redis-env]
    depends_on:
      - api
      - web
    networks:
      - plane_net

  api:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-v1.2.2}
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/logs/api:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq
    networks:
      - plane_net

  worker:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-v1.2.2}
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/logs/worker:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    networks:
      - plane_net

  beat-worker:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-v1.2.2}
    container_name: plane-beat
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/logs/beat:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    networks:
      - plane_net

  migrator:
    image: artifacts.plane.so/makeplane/plane-backend:${APP_RELEASE:-v1.2.2}
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    restart: "no"
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/logs/migrator:/code/plane/logs
    environment:
      <<: [*app-env, *db-env, *redis-env, *minio-env, *aws-s3-env, *proxy-env]
    depends_on:
      - plane-db
      - plane-redis
    networks:
      - plane_net

  plane-db:
    image: postgres:15.7-alpine
    container_name: plane-db
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    environment:
      <<: *db-env
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/pgdata:/var/lib/postgresql/data
    networks:
      - plane_net

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/redis:/data
    networks:
      - plane_net

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    container_name: plane-mq
    restart: unless-stopped
    environment:
      <<: *mq-env
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/rabbitmq:/var/lib/rabbitmq
    networks:
      - plane_net

  plane-minio:
    image: minio/minio:latest
    container_name: plane-minio
    command: server /export --console-address ":9090"
    restart: unless-stopped
    environment:
      <<: *minio-env
    volumes:
      - ${DOCKER_DL}/Devteam/Plane/uploads:/export
    networks:
      - plane_net

  proxy:
    image: artifacts.plane.so/makeplane/plane-proxy:${APP_RELEASE:-v1.2.2}
    container_name: plane-proxy
    restart: unless-stopped
    environment:
      <<: *proxy-env
    depends_on:
      - web
      - api
      - space
      - admin
      - live
    networks:
      - plane_net
