# Internal reverse proxy for d01 (split-DNS / Pi-hole)
# When app hostnames resolve to d01 (e.g. via Pi-hole), this serves HTTPS and proxies to apps.
# TLS: Let's Encrypt via Cloudflare DNS-01 (CF_API_TOKEN from /mnt/docker/internal-proxy/.env).
# Same certs as external tunnel — URLs work identically internally and externally.
#
# Ports 80 and 443 must not be used by another service on d01.

services:
  caddy-internal:
    image: caddybuilds/caddy-cloudflare:latest
    container_name: caddy-internal-d01
    restart: unless-stopped
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_DL:-/mnt/docker}/internal-proxy/caddy-data:/data
      - ${DOCKER_DL:-/mnt/docker}/internal-proxy/caddy-config:/config
    networks:
      - d01_internal
      - media_net
      - calibre_net
      - homebridge_net
      - duplicati_net

networks:
  d01_internal:
    external: true
    name: d01_internal
  media_net:
    external: true
    name: media_net
  calibre_net:
    external: true
    name: calibre_net
  homebridge_net:
    external: true
    name: homebridge_net
  duplicati_net:
    external: true
    name: duplicati_net
