# Internal reverse proxy for d01 (split-DNS / Pi-hole)
# When app hostnames resolve to d01 (e.g. via Pi-hole), this serves HTTPS and proxies to apps.
# TLS: private CA certs from DATA_DIR/certs (generated by gen-certs.sh; no Cloudflare API needed).
# Trust /mnt/docker/internal-proxy/certs/ca.crt on workstations once for browser trust.
#
# Ports 80 and 443 must not be used by another service on d01.

services:
  caddy-internal:
    image: caddy:latest
    container_name: caddy-internal-d01
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DOCKER_DL:-/mnt/docker}/internal-proxy/certs:/etc/caddy/certs:ro
      - ${DOCKER_DL:-/mnt/docker}/internal-proxy/caddy-data:/data
      - ${DOCKER_DL:-/mnt/docker}/internal-proxy/caddy-config:/config
    networks:
      - d01_internal
      - media_net
      - calibre_net
      - homebridge_net
      - duplicati_net

networks:
  d01_internal:
    external: true
    name: d01_internal
  media_net:
    external: true
    name: media_net
  calibre_net:
    external: true
    name: calibre_net
  homebridge_net:
    external: true
    name: homebridge_net
  duplicati_net:
    external: true
    name: duplicati_net
