# Override for locally-managed tunnel: config file + credentials instead of TUNNEL_TOKEN.
# Secrets live in DATA_DIR (/mnt/docker/cloudflared), not alongside the scripts.
#
# 1. Create a tunnel once: Zero Trust → Tunnels → Create tunnel → give it a name (e.g. d01).
# 2. Copy credentials JSON to /mnt/docker/cloudflared/credentials.json.
# 3. Set TUNNEL_ID in /mnt/docker/cloudflared/.env.
# 4. Run: ./generate-config.sh   (generates /mnt/docker/cloudflared/config.yml from apps.yml)
# 5. Run: ./cloudflared.sh up

services:
  cloudflared:
    command: tunnel run --config /etc/cloudflared/config.yml
    volumes:
      - ${DOCKER_DL:-/mnt/docker}/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${DOCKER_DL:-/mnt/docker}/cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
